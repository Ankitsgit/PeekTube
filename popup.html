<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  body { width:280px; background:#0f0f0f; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; padding:18px; margin:0; }
  .logo { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  .logo-icon { width:32px; height:32px; background:#ff0000; border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .logo-title { font-size:14px; font-weight:700; }
  .logo-sub   { font-size:11px; color:#777; margin-top:1px; }
  .box { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.09); border-radius:10px; padding:12px 14px; margin-bottom:14px; }
  .row { display:flex; justify-content:space-between; align-items:center; }
  .badge { font-size:11px; font-weight:600; padding:3px 8px; border-radius:20px; background:#1a3a1a; color:#4ade80; border:1px solid rgba(74,222,128,0.2); }
  .label { font-size:12px; color:#aaa; }
  h3 { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:#666; margin:0 0 8px; }
  code { font-family:monospace; font-size:11px; color:#f472b6; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.09); border-radius:5px; padding:7px 10px; display:block; word-break:break-all; line-height:1.5; margin-bottom:10px; }
  a { color:#ff0000; font-size:12px; font-weight:500; }
  p { font-size:12px; color:#aaa; line-height:1.6; margin:0; }
  .tip { background:rgba(255,200,0,0.06); border:1px solid rgba(255,200,0,0.15); border-radius:8px; padding:10px 12px; font-size:12px; color:#fbbf24; line-height:1.5; margin-top:12px; }
</style>
</head>
<body>
<div class="logo">
  <div class="logo-icon">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="white"><path d="M6.5 11.5l5-3.5-5-3.5v7z"/></svg>
  </div>
  <div>
    <div class="logo-title">Channel Preview</div>
    <div class="logo-sub">YouTube Hover Cards</div>
  </div>
</div>

<div class="box">
  <div class="row">
    <span class="label">Status</span>
    <span class="badge">● Active</span>
  </div>
</div>

<h3>Setup — Add Your API Key</h3>
<p>Open <code style="display:inline;padding:2px 5px">background.js</code> and replace line 7:</p>
<code>var YOUTUBE_API_KEY = "YOUR_KEY_HERE";</code>
<a href="https://console.developers.google.com/" target="_blank">Get a free API key →</a>

<div class="tip">
  <strong style="display:block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">How to use</strong>
  Hover over any YouTube channel name or avatar for 300ms to see the preview card.
</div>
</body>
</html>
